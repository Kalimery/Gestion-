<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord | EduManage Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-chalkboard-user"></i> EduManage</div>
            <div class="user-info">
                <div class="user-badge" id="currentUserRole"><i class="fas fa-user-check"></i> Chargement...</div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </nav>
        <div class="dashboard-layout">
            <aside class="sidebar">
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i> <span>Tableau de bord</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i> <span>Étudiants</span>
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="fas fa-chalkboard-user"></i> <span>Enseignants</span>
                </a>
                <a href="modules.html" class="nav-item">
                    <i class="fas fa-book-open"></i> <span>Modules</span>
                </a>
                <a href="grades.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> <span>Notes</span>
                </a>
            </aside>
            <main class="content-area">
                <div class="page active-page">
                    <div class="card">
                        <h2><i class="fas fa-chart-pie"></i> Vue d'ensemble</h2>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <h3 id="statStudents">0</h3>
                                <p>Étudiants</p>
                            </div>
                            <div class="stat-box">
                                <h3 id="statTeachers">0</h3>
                                <p>Enseignants</p>
                            </div>
                            <div class="stat-box">
                                <h3 id="statModules">0</h3>
                                <p>Modules</p>
                            </div>
                            <div class="stat-box">
                                <h3 id="statGrades">0</h3>
                                <p>Notes saisies</p>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h3>📊 Dernières activités</h3>
                        <div id="recentActivities"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
